# CI workflow for Markdown files
name: on-ci-push-markdown

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - "**/*.md"
      - "docs/**/*.md"
      - ".markdownlint.yaml"
      - ".github/workflows/on-ci-push-markdown.yaml"
      - ".github/workflows/ci-markdown.yaml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - "**/*.md"
      - "docs/**/*.md"
      - ".markdownlint.yaml"
      - ".github/workflows/on-ci-push-markdown.yaml"
      - ".github/workflows/ci-markdown.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  markdown-ci:
    uses: y-miyazaki/config/.github/workflows/ci-markdown.yaml@760cde0cc108082323466cbbf1d089019d75b513 # v1.0.3
    permissions:
      contents: read
      pull-requests: write
