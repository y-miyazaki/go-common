# CI workflow: mise lockfile update on push
# Usage: This workflow requires a GitHub App for auto-committing lockfile updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Pass BOT_APP_* via secrets: (remap MAINTENANCE_BOT_* as needed).
name: on-ci-push-mise-update-lock

on:
  push:
    paths:
      - "mise.toml"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  mise-update-lock:
    uses: y-miyazaki/config/.github/workflows/ci-mise-update-lock.yaml@8b07b501759bbe4716c759dfdbd914d4d5ebbdc3 # v1.8.59
    permissions:
      contents: read
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
    with:
      environment: "default"
      mise_version: "2026.6.13"
