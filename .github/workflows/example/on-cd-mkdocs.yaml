# Deploy MkDocs documentation to GitHub Pages on push to main
name: on-cd-mkdocs

on:
  push:
    branches:
      - "main"
    paths:
      - "docs/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build:
    permissions:
      contents: read
    uses: y-miyazaki/config/.github/workflows/cd-mkdocs.yaml@5a5408053a1d6bf357808590ae74f5ccb8eb31f4 # v1.8.9
    with:
      artifact_name: mkdocs-site
      config_file: mkdocs.yml
      pip_packages: mkdocs-material mdx-truly-sane-lists

  deploy:
    needs: build
    permissions:
      contents: read
      id-token: write
      pages: write
    uses: y-miyazaki/config/.github/workflows/cd-github-pages.yaml@5a5408053a1d6bf357808590ae74f5ccb8eb31f4 # v1.8.9
    with:
      artifact_name: mkdocs-site
