# CI workflow: Aqua checksum update on push
# Usage: This workflow requires a GitHub App for auto-committing checksum updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Create the following secrets (repository or environment):
#    - BOT_APP_CLIENT_ID: The GitHub App's Client ID
#    - BOT_APP_PRIVATE_KEY: The GitHub App's private key (PEM format)
name: on-ci-push-aqua-update-checksum

on:
  push:
    paths:
      - "aqua.yaml"
      - "aqua/*.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aqua-update-checksum:
    uses: y-miyazaki/config/.github/workflows/ci-aqua-update-checksum.yaml@4d5104b3af3d62cc3afa960f5c9f99ae95699979 # v1.0.6
    permissions:
      contents: read
    with:
      environment: "default"
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
