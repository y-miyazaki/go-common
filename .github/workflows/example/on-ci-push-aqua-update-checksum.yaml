# CI workflow: Aqua checksum update on push
# Usage: This workflow requires a GitHub App for auto-committing checksum updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Pass BOT_APP_* via secrets: (remap MAINTENANCE_BOT_* as needed).
name: on-ci-push-aqua-update-checksum

on:
  push:
    paths:
      - "aqua.yaml"
      - "aqua/*.yaml"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  aqua-update-checksum:
    uses: y-miyazaki/config/.github/workflows/ci-aqua-update-checksum.yaml@b7dbe0b8b43ebe4e476c2466c858fefd9b7728d9 # v1.8.49
    permissions:
      contents: read
    secrets:
      BOT_APP_CLIENT_ID: ${{ secrets.MAINTENANCE_BOT_APP_CLIENT_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
    with:
      environment: "default"
