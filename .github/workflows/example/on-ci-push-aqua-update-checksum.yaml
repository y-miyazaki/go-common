# Usage: This workflow requires a GitHub App for auto-committing checksum updates.
# 1. Create a GitHub App with "Contents: Read & Write" repository permission.
# 2. Install the App on the target repository (or organization).
# 3. Create the following secrets (repository or environment):
#    - BOT_APP_ID: The GitHub App's App ID
#    - BOT_APP_PRIVATE_KEY: The GitHub App's private key (PEM format)
name: on-ci-push-aqua-update-checksum

on:
  push:
    paths:
      - "aqua.yaml"
      - "aqua/*.yaml"
      - "aqua-checksums.json"
      - ".github/workflows/on-ci-push-aqua-update-checksum.yaml"
      - ".github/workflows/ci-aqua-update-checksum.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aqua-update-checksum:
    uses: y-miyazaki/config/.github/workflows/ci-aqua-update-checksum.yaml@6b09c1551e5376a4e2a8bca0356c182ecdfb454e # v1.0.1
    permissions:
      contents: read
    with:
      environment: "default"
    secrets:
      BOT_APP_ID: ${{ secrets.MAINTENANCE_BOT_APP_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.MAINTENANCE_BOT_APP_PRIVATE_KEY }}
