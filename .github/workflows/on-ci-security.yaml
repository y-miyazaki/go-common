# CI workflow: repository security (Trivy + SBOM + SAST) on schedule and security-relevant changes
# Copy to .github/workflows/on-ci-security.yaml in your repository.
# Design doc: docs/superpowers/specs/2026-07-24-ci-security-workflow-design.md
#
# Monorepo: add security jobs with different scan_ref / artifact_prefix, for example:
#   with:
#     artifact_prefix: api
#     scan_ref: services/api
#
# CodeQL languages (codeql_languages):
#   Go:         '["actions","go"]'
#   Node.js:    '["javascript-typescript","actions"]'
#   Terraform/IaC-only (no app source): '["actions"]'
name: on-ci-security

on:
  pull_request:
    branches:
      - "develop"
      - "feature/**"
      - "hotfix/**"
      - "main"
      - "master"
      - "release/**"
    paths:
      - "**/.tflint.hcl"
      - "**/*.go"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tsx"
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package-lock.json"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - ".github/workflows/on-ci-security.yaml"
      - ".semgrepignore"
      - ".trivyignore"
      - "nodejs/**"
      - "trivy.yaml"
      - "trivy-secrets.yaml"
  push:
    branches:
      - "develop"
      - "feature/**"
      - "hotfix/**"
      - "main"
      - "master"
      - "release/**"
    paths:
      - "**/.tflint.hcl"
      - "**/*.go"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.ts"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.tsx"
      - "**/Dockerfile"
      - "**/Dockerfile.*"
      - "**/go.mod"
      - "**/go.sum"
      - "**/package-lock.json"
      - "**/package.json"
      - "**/pnpm-lock.yaml"
      - "**/yarn.lock"
      - ".github/workflows/on-ci-security.yaml"
      - ".semgrepignore"
      - ".trivyignore"
      - "nodejs/**"
      - "trivy.yaml"
      - "trivy-secrets.yaml"
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  pull-requests: write

jobs:
  sast:
    uses: y-miyazaki/config/.github/workflows/ci-sast.yaml@00d6e7a9346341b5fc6318893ff71b80b670fd62 # v1.8.58
    with:
      # Go:         codeql_languages: '["actions","go"]'
      # Node.js:    codeql_languages: '["javascript-typescript","actions"]'
      # Terraform/IaC-only: codeql_languages: '["actions"]'
      codeql_languages: '["actions","go"]'
    permissions:
      actions: read
      contents: read
      security-events: write

  security:
    uses: y-miyazaki/config/.github/workflows/ci-security.yaml@00d6e7a9346341b5fc6318893ff71b80b670fd62 # v1.8.58
    permissions:
      contents: read
      pull-requests: write
      security-events: write
