name: ci-push-aqua-update-checksum

on:
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - "aqua.yaml"
      - "aqua/*.yaml"
      - "aqua-checksums.json"
      - ".github/workflows/ci-push-aqua-update-checksum.yaml"
      - ".github/workflows/reusable-ci-aqua-update-checksum.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  aqua-update-checksum:
    uses: ./.github/workflows/reusable-ci-aqua-update-checksum.yaml
    permissions:
      contents: read
    secrets:
      BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
      BOT_APP_PRIVATE_KEY: ${{ secrets.BOT_APP_PRIVATE_KEY }}
