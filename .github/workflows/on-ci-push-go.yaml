# CI workflow for base component in prd environment
name: on-ci-push-go

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".github/workflows/on-ci-push-go.yaml"
      - ".github/workflows/ci-go.yaml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "trivy.yaml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - ".github/workflows/on-ci-push-go.yaml"
      - ".github/workflows/ci-go.yaml"
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "trivy.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    uses: y-miyazaki/config/.github/workflows/ci-go.yaml@6b09c1551e5376a4e2a8bca0356c182ecdfb454e # v1.0.1
    with:
      environment: "base"
      component: "base"
      go_project_path: "."
    permissions:
      contents: read
      id-token: write
      pull-requests: write
