# CI workflow: Go CI on push/PR
name: on-ci-push-go

on:
  push:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "trivy.yaml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "hotfix/**"
      - "release/**"
      - "develop"
      - "feature/**"
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yaml"
      - "trivy.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  detect-go-version:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      go-version: ${{ steps.read-go-version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Read go version from go.mod
        id: read-go-version
        run: |
          GO_VERSION=$(grep -E '^go ' go.mod | awk '{print $2}')
          echo "version=$GO_VERSION" >> "$GITHUB_OUTPUT"

  go-ci:
    needs: detect-go-version
    uses: y-miyazaki/config/.github/workflows/ci-go.yaml@861f3703bcba456b3d636c9fab98f8bc66e31729 # v1.3.1
    with:
      component: "base"
      go_project_path: "."
      go_version: ${{ needs.detect-go-version.outputs.go-version }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
