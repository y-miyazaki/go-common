# actionlint configuration
# https://github.com/rhysd/actionlint/blob/main/docs/config.md

# Path-specific configurations
paths:
  # Ignore false positive: "true"/"false" string literals are incorrectly detected as bool
  # when passed to string-typed inputs in reusable workflows
  .github/workflows/**/*.{yml,yaml}:
    ignore:
      # db_ssl_mode accepts "true"/"false" as string for MySQL/Redshift
      - 'input "db_ssl_mode" is typed as string by reusable workflow .+ bool value cannot be assigned'
      # copilot-requests is a valid GitHub permission scope not yet recognized by actionlint
      - 'unknown permission scope "copilot-requests"'
      # queue: max is valid GitHub Actions concurrency; actionlint 1.7.x schema pending rhysd/actionlint#661
      - 'unexpected key "queue" for "concurrency" section'
      - 'input "environment" is not defined in'
      - 'property "environment" is not defined in object type'
  .github/workflows/**/*.lock.{yml,yaml}:
    ignore:
      # Ignore all errors for lock files used as generated workflow metadata.
      - ".*"
