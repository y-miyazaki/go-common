mcp_configs:
  aws-documentation-mcp-server:
    name: aws-documentation-mcp-server
    transport: stdio
    args:
    - awslabs.aws-documentation-mcp-server==1.1.26
    registry: false
    command: uvx
  aws-knowledge-mcp-server:
    name: aws-knowledge-mcp-server
    transport: stdio
    args:
    - mcp-proxy==0.12.0
    - --transport
    - streamablehttp
    - https://knowledge-mcp.global.api.aws
    registry: false
    command: uvx
  aws-mcp:
    name: aws-mcp
    transport: streamable-http
    registry: false
    url: https://aws-mcp.us-east-1.api.aws/mcp?oauth=initialize
  aws-pricing-mcp-server:
    name: aws-pricing-mcp-server
    transport: stdio
    args:
    - awslabs.aws-pricing-mcp-server==1.0.31
    registry: false
    command: uvx
  codebase-memory-mcp:
    name: codebase-memory-mcp
    transport: stdio
    args: []
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@3.2.3'
    registry: false
    command: npx
  fetch:
    name: fetch
    transport: stdio
    args:
    - mcp-server-fetch==2026.7.10
    registry: false
    command: uvx
  github:
    name: github
    transport: stdio
    args:
    - -lc
    - TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"; exec uvx mcp-compressor==0.31.6 -- https://api.githubcopilot.com/mcp/
      -H "Authorization=Bearer ${TOKEN}" --auth explicit-headers
    registry: false
    command: bash
  lean-ctx:
    name: lean-ctx
    transport: stdio
    args:
    - -y
    - lean-ctx-bin@3.9.12
    registry: false
    command: npx
