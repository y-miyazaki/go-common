    args: []
    registry: false
    command: codebase-memory-mcp
  context7:
    name: context7
    transport: stdio
    args:
    - -y
    - '@upstash/context7-mcp@3.2.3'
    registry: false
    command: npx
  fetch:
    name: fetch
    transport: stdio
    args:
    - mcp-server-fetch==2026.7.10
    registry: false
    command: uvx
  github:
