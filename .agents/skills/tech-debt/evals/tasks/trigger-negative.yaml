id: tech-debt-trigger-negative-001
name: tech-debt rejects code-fix requests
description: >-
  Validate tech-debt does not apply refactors or dependency upgrades;
  report-only scope is preserved for structural debt.
tags:
  - quality
  - trigger-negative
  - boundary-guardrail
inputs:
  prompt: >-
    Use tech-debt with may_edit true. The user asks to extract the shared validator and bump
    the EOL dependency now. Classify injected signals only; do not edit application or
    lockfile paths for structural work. Note the fix request as out of scope in ### Deferred
    or Overview. Emit apply shape with report_file under ### Changes and ## Verification.
    Emit ## Overview and ## Summary per common-output-format.md. Include Category labels on
    rows.
  context:
    commit_range: eval0001..eval0002
    report_file: docs/report/tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
expected:
  output_contains:
    - out of scope
    - Changes
  outcomes:
    - type: task_completed
