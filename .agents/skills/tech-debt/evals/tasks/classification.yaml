id: tech-debt-classification-001
name: tech-debt classifies mixed signals by taxonomy
description: >-
  Validate taxonomy classification in apply shape and persisted report sections.
tags:
  - quality
  - classification
inputs:
  prompt: >-
    Use tech-debt with may_edit true. Classify injected signals with Category from
    category-debt-taxonomy.md. Write report_file with Critical/High-Priority/Watch sections.
    Emit apply PR shape with ### Changes (report_file path) and ## Verification. Put vague
    TODO noise in persisted Noise section only — not in PR Candidates. Do not edit
    application source. Emit ## Overview and ## Summary per common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    report_file: docs/report/tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: todo_comment
        path: evals/files/sample_service.go.txt
        line: 5
        snippet: "TODO: extract shared validator used by HandleCreate and HandleUpdate"
        hint: code_quality
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
      - kind: stale_doc
        path: evals/files/README.md
        line: 3
        snippet: "See workflow `.github/workflows/ci-build.yaml` for CI."
        hint: documentation
      - kind: todo_comment
        path: evals/files/noise.go.txt
        line: 2
        snippet: "TODO: maybe later"
    hotspots: []
expected:
  output_contains:
    - code_quality
    - dependency_version
    - documentation
    - Changes
    - Category
  outcomes:
    - type: task_completed
