id: tech-debt-previous-001
name: tech-debt compares previous report for regression
description: Validate previous_report comparison marks resolved and new items.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use tech-debt with may_edit true. Read previous_report
    evals/files/previous-report.sample.md. The noise.go.txt TODO is absent from current
    signals — mark Resolved in persisted report. The new eol_hint is New. Emit apply PR
    shape with ### Changes (report_file) and ## Verification. Mark Resolved items in Overview
    and persisted report. Include Category dependency_version on rows. Emit ## Overview and
    ## Summary per common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    report_file: docs/report/tech-debt/2026-07-19.md
    previous_report: evals/files/previous-report.sample.md
    skip: false
    signals:
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
    hotspots: []
expected:
  output_contains:
    - Resolved
    - dependency_version
    - Changes
    - Overview
  outcomes:
    - type: task_completed
