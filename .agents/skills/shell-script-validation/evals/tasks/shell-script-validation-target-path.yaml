id: shell-script-validation-target-path-001
name: shell-script-validation optional target path path
description: |
  Validate that shell-script-validation accepts an optional script path argument
  while keeping canonical flags.
tags:
  - quality
  - target-path
  - workflow
inputs:
  prompt: |
    Use shell-script-validation on the single shell script path scripts/deploy.sh.
    The path is optional in the skill input and defaults to workspace root when omitted.
    Include canonical flags `-v -f --check-function-docs`.
    State the exact bash scripts/validate.sh command. Return ## Summary and ## Tool Results.
  context:
    target: SKILL.md
expected:
  output_contains:
    - "## Summary"
    - "## Tool Results"
    - "scripts/deploy.sh"
    - "--check-function-docs"
  outcomes:
    - type: task_completed
