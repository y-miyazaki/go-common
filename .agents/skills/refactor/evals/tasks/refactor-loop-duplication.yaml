id: refactor-loop-duplication-001
name: refactor automation path surveys all hints then applies
description: Validate automation path surveys every hint internally and reports apply shape when may_edit is true.
tags:
  - quality
  - automation
  - classification
inputs:
  prompt: >-
    Use refactor (automation path) with may_edit true. Survey all duplication_block hints
    in context internally, then apply every actionable candidate. Emit apply PR sections
    from pr-body-template.md: ## Overview, ## Summary (### Changes only — no ### Candidates),
    ## Verification, and ## Session Metrics per category-automation-envelope.md.
  context:
    commit_range: eval0001..eval0002
    skip: false
    hints:
      - kind: duplication_block
        path: scripts/example.sh
        detail: lines 10-17 duplicate scripts/other.sh:40-47
        lines: 8
      - kind: duplication_block
        path: scripts/helper.sh
        detail: lines 3-10 duplicate scripts/util.sh:20-27
        lines: 8
expected:
  output_contains:
    - "### Changes"
    - "## Verification"
    - Session Metrics
    - "## Overview"
    - "## Summary"
  outcomes:
    - type: task_completed
