id: refactor-interactive-follow-up-001
name: refactor interactive fix follow-up
description: Validate follow-up apply request after prior survey enables Phase B.
tags:
  - quality
  - interactive
inputs:
  prompt: >-
    Use refactor. Prior turn surveyed duplication in scripts/example.sh. The user now says
    apply the refactor. Emit apply shape with ### Changes and ## Verification. Do not edit
    files in this mock eval. Emit ## Overview and ## Summary per common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    skip: false
    hints:
      - kind: duplication_block
        path: scripts/example.sh
        detail: lines 10-17 duplicate scripts/other.sh:40-47
        lines: 8
expected:
  output_contains:
    - Changes
    - Overview
    - Verification
  outcomes:
    - type: task_completed
