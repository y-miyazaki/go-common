name: docs-updater-eval
description: >-
  Evaluation suite for docs-updater.
  Verifies interactive/hook path (detect_changes.sh) and automation path (findings JSON),
  may_edit behavior, skip conditions, and structured report output.
skill: docs-updater
version: "1.3"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'## Overview' in output or 'Overview' in output or '## Summary' in output or 'Summary' in output"
        - >-
          '### Candidates' in output or '### Changes' in output or '### Deferred' in output
          or 'Session Metrics' in output or 'no documentation impact' in output.lower()
          or 'no documentation update required' in output.lower() or 'exceeded-scope' in output
          or 'no edits applied' in output
  - type: text
    name: report_sections
    weight: 0.5
    config:
      regex_match:
        - (### Candidates|### Changes|### Deferred|Session Metrics|## Overview|## Summary)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml
