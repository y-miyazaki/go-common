id: docs-updater-loop-boundary-001
name: docs-updater loop path defers denylist infrastructure finding
description: Validate infrastructure path finding is Watch or Noise, not edited.
tags:
  - quality
  - loop-path
  - boundary-guardrail
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. A finding points at src/infrastructure/deploy.md
    which is on the denylist. Classify it as Watch or Noise / Ignore; do not
    edit denylist paths. Fix only the allowlisted stale doc finding as
    High-Priority. Emit PR ## Overview and ## Summary plus Session Metrics table
    with High-Priority Items, Watch Items, and Noise / Ignore sections.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: docs/guide/overview.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
      - file: src/infrastructure/deploy.md
        reason: stale runbook reference
        source_commit: eval0002
expected:
  output_contains:
    - High-Priority
    - Watch
    - denylist
    - "## Summary"
    - "## Overview"
  outcomes:
    - type: task_completed
