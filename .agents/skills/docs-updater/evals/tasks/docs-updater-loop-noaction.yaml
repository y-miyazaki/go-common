id: docs-updater-loop-noaction-001
name: docs-updater automation path no findings
description: |
  Validate automation path emits survey no-op when skip or empty findings.
tags:
  - quality
  - automation-path
  - skip-path
inputs:
  prompt: >-
    Use docs-updater (automation path). Context JSON has skip=true and findings=[]. Emit
    survey no-op with ## Overview indicating no documentation impact detected. Include
    Session Metrics. Do not edit files. Do not emit ### Changes or ## Verification. Include
    ## Summary per common-output-format.md. State no edits applied in Overview.
  context:
    skip: true
    findings: []
expected:
  output_contains:
    - Overview
    - Session Metrics
    - no documentation impact
  outcomes:
    - type: task_completed
