id: docs-updater-loop-triage-001
name: docs-updater automation triage report contract
description: |
  Validate automation path survey shape and PR Overview when findings present with may_edit false.
tags:
  - quality
  - automation-path
  - output-contract
inputs:
  prompt: >-
    Use docs-updater (automation path). ## Constraints may_edit: false Context JSON:
    skip=false, findings=[{ "file": "docs/guide.md", "reason": "stale workflow path",
    "source_commit": "abc1234" }]. Do not edit files. Emit survey shape with ## Overview,
    ### Candidates, and Session Metrics. Do not emit ## Verification. Include ## Summary per
    common-output-format.md. State no edits applied in Overview.
  context:
    skip: false
    findings:
      - file: docs/guide.md
        reason: stale workflow path
        source_commit: abc1234
expected:
  output_contains:
    - Candidates
    - Overview
    - Session Metrics
    - may_edit
  outcomes:
    - type: task_completed
