id: docs-updater-loop-fixture-001
name: docs-updater loop path fixes stale workflow reference
description: Validate L2 High-Priority fix targets stale workflow path in fixture doc.
tags:
  - quality
  - loop-path
  - fixture
inputs:
  prompt: >-
    Use docs-updater (loop path) at L2. Fix the High-Priority stale workflow
    reference in evals/files/README.stale.md per injected finding. Report the fix
    in High-Priority Items (Fixed) and Summary. Emit PR ## Overview and ## Summary
    plus Session Metrics table with High-Priority Items, Watch Items, and Noise /
    Ignore sections.
  context:
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - High-Priority
    - README.stale.md
    - ci-build.yaml
    - "## Summary"
    - "## Overview"
  outcomes:
    - type: task_completed
