id: changelog-noaction-001
name: changelog handles skip with empty commits
description: Validate skip=true with empty commits and releases exits without edits.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use changelog. Context has skip=true and empty commits/releases. Emit survey no-op with
    ## Overview explaining no unreleased changelog commits. Do not edit CHANGELOG.md. Do not
    emit ### Changes or ## Verification. Include ## Summary per common-output-format.md.
    State no edits applied in Overview.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: true
    commit_range: eval0001..eval0001
    skip: true
    commits: []
    releases: []
expected:
  output_contains:
    - no unreleased
    - Overview
  outcomes:
    - type: task_completed
