id: changelog-basic-001
name: changelog-basic
description: >-
  Process conventional commits and emit apply shape with Changes and Verification.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use changelog with may_edit true. Process the injected conventional commits and emit
    apply shape with ## Overview, ### Changes, optional ### Skipped, and ## Verification. Do
    not emit ### Candidates. Include ## Summary per common-output-format.md.
  context:
    changelog_file: CHANGELOG.md
    commit_range: eval0001..eval0002
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add changelog workflow
expected:
  output_contains:
    - Changes
    - Overview
    - Verification
  outcomes:
    - type: task_completed
