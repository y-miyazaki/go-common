id: report-tech-debt-previous-001
name: report-tech-debt compares previous report for regression
description: Validate previous_report comparison marks resolved and new items.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use report-tech-debt at L2. Read previous_report evals/files/previous-report.sample.md.
    The noise.go.txt TODO is absent from current signals — mark Resolved. The new
    eol_hint is New. Emit Resolved Since Previous and Summary sections. Emit PR ## Overview and ## Summary plus Session Metrics table with Critical, High-Priority, Watch, and Noise / Ignore sections including Category fields.
  context:
    level: L2
    report_file: docs/report/report-tech-debt/2026-07-19.md
    previous_report: evals/files/previous-report.sample.md
    skip: false
    signals:
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
    hotspots: []
expected:
  output_contains:
    - Resolved
    - dependency_version
    - High-Priority
    - Summary
  outcomes:
    - type: task_completed
