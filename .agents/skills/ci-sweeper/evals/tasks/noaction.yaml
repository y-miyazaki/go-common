id: ci-sweeper-noaction-001
name: ci-sweeper no actionable failures
description: Validate ci-sweeper exits cleanly when failures array is empty.
tags:
  - trigger
  - negative
inputs:
  prompt: >-
    Use ci-sweeper. Context JSON has skip=true and failures=[]. Emit survey no-op with ##
    Overview and ## Summary explaining no actionable failures. Do not emit ### Changes or ##
    Verification. State no edits applied in Overview.
  context:
    skip: true
    failures: []
expected:
  output_contains:
    - Overview
    - no actionable
  outcomes:
    - type: task_completed
