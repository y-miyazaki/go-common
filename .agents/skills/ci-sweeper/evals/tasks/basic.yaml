id: ci-sweeper-contract-001
name: ci-sweeper triages injected regression failure
description: >-
  Validate ci-sweeper classifies an injected regression failure into Changes
  when may_edit is true.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use ci-sweeper with may_edit true. Classify the injected shellcheck regression from
    failures[]. Emit apply shape with ## Overview, ### Changes, and ## Verification. Do not
    edit files in this mock eval. Include ## Summary per common-output-format.md. Include
    Category labels on rows.
  context:
    skip: false
    failures:
      - workflow_name: ci-shell
        workflow_run_id: "987654321"
        head_sha: eval0002
        head_branch: main
        job_name: shellcheck
        failure_type: regression
        log_excerpt: "SC2086: Double quote to prevent globbing and word splitting."
        run_url: https://github.com/org/repo/actions/runs/987654321
        source_commit: eval0002
        reason: shellcheck SC2086 in scripts/deploy.sh
expected:
  output_contains:
    - Changes
    - Overview
    - regression
  outcomes:
    - type: task_completed
