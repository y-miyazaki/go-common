id: ci-sweeper-defer-001
name: ci-sweeper defers when more than three failures
description: Validate >3 failures triggers fix-first-regression-only defer policy.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use ci-sweeper with may_edit true. Context has four regression failures. Fix only the
    first regression in mock output; defer the other three under ### Deferred. Emit apply
    shape with ## Overview, ### Changes, ### Deferred, and ## Verification. Note deferral in
    Overview. Include ## Summary per common-output-format.md.
  context:
    skip: false
    failures:
      - workflow_name: ci-shell
        job_name: shellcheck
        failure_type: regression
        log_excerpt: SC2086 in scripts/a.sh
        reason: regression a
      - workflow_name: ci-shell
        job_name: shellcheck
        failure_type: regression
        log_excerpt: SC2086 in scripts/b.sh
        reason: regression b
      - workflow_name: ci-go
        job_name: test
        failure_type: regression
        log_excerpt: compile error in pkg/c
        reason: regression c
      - workflow_name: ci-go
        job_name: test
        failure_type: regression
        log_excerpt: compile error in pkg/d
        reason: regression d
expected:
  output_contains:
    - Deferred
    - Changes
    - defer
    - Overview
  outcomes:
    - type: task_completed
