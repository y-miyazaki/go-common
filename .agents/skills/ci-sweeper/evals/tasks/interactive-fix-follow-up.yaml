id: ci-sweeper-interactive-follow-up-001
name: ci-sweeper interactive fix follow-up
description: Validate follow-up fix request after prior survey enables apply shape.
tags:
  - quality
  - interactive
inputs:
  prompt: >-
    Use ci-sweeper. Prior turn surveyed the injected regression. The user now says 直して —
    apply the fix for the shellcheck failure. Emit apply shape with ### Changes and ##
    Verification. Do not edit files in this mock eval. Emit ## Overview and ## Summary per
    common-output-format.md.
  context:
    skip: false
    failures:
      - workflow_name: ci-shell
        workflow_run_id: "987654321"
        head_sha: eval0002
        head_branch: main
        job_name: shellcheck
        failure_type: regression
        log_excerpt: "SC2086: Double quote to prevent globbing and word splitting."
        run_url: https://github.com/org/repo/actions/runs/987654321
        source_commit: eval0002
        reason: shellcheck SC2086 in scripts/deploy.sh
expected:
  output_contains:
    - Changes
    - Overview
    - Verification
  outcomes:
    - type: task_completed
