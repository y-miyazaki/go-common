id: ci-sweeper-trigger-negative-001
name: ci-sweeper rejects manual debugging requests
description: Validate manual CI debugging is out of scope for loop automation.
tags:
  - quality
  - trigger-negative
inputs:
  prompt: >-
    Use ci-sweeper. The user asks you to manually debug a flaky test on their laptop without
    injected failure JSON — that is out of scope for this skill. Explain the request is out
    of scope. Emit survey no-op with ## Overview and ## Summary explaining no actionable
    failures when failures is empty. Under ## Summary include ### Candidates noting no
    actionable failures. Do not edit files. State no edits applied in Overview.
  context:
    skip: true
    failures: []
expected:
  output_contains:
    - out of scope
    - no actionable
    - Overview
  outcomes:
    - type: task_completed
