id: ci-sweeper-trigger-negative-001
name: ci-sweeper rejects manual debugging requests
description: Validate manual CI debugging is out of scope for loop automation.
tags:
  - quality
  - trigger-negative
inputs:
  prompt: >-
    Use ci-sweeper. The user asks you to manually debug a flaky test on
    their laptop without injected failure JSON — that is out of scope for this
    skill. Explain the request is out of scope. Emit triage report sections
    with Summary Outcome indicating no actionable failures when failures is empty.
    Emit PR ## Overview and ## Summary plus Session Metrics table with Actionable
    Fixes, Watch Items, and Ignored sections.
  context:
    level: L2
    skip: true
    failures: []
expected:
  output_contains:
    - out of scope
    - no actionable
    - Summary
  outcomes:
    - type: task_completed

