name: ci-sweeper-eval
description: >-
  Evaluation suite for ci-sweeper.
  Verifies triage classification, defer policy, no-action exits, and trigger-negative.
skill: ci-sweeper
version: "1.2"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'Overview' in output"
        - "'Summary' in output"
        - "'Session Metrics' in output"
        - "'Actionable Fixes' in output or 'Watch Items' in output or 'no actionable' in output"
  - type: text
    name: triage_sections
    weight: 0.5
    config:
      regex_match:
        - (Actionable Fixes|Watch Items)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml

