id: github-actions-validation-failure-details-001
name: github-actions-validation failure details path
description: |
  Validate failed validation output includes error details section.

tags:
  - quality
  - error-details

inputs:
  prompt: "Use github-actions-validation. Assume one tool fails and return sections ## Summary, ## Tool Results, ## Error Details."
  context:
    target: SKILL.md

expected:
  output_contains:
    - "## Summary"
    - "## Tool Results"
    - "## Error Details"
  outcomes:
    - type: task_completed
