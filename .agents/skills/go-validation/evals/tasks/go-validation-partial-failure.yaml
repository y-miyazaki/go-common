id: go-validation-partial-failure-001
name: go-validation partial tool failure path
description:
  "Validate that when one tool succeeds and another fails, both results
  are reported.

  "
tags:
  - quality
  - partial-failure
  - edge-case
inputs:
  prompt:
    "Use go-validation. Assume one validation tool passes and another fails
    with go vet findings in a Go package. Return ## Summary, ## Tool Results showing
    mixed pass/fail status."
  context:
    target: SKILL.md
expected:
  output_contains:
    - "## Summary"
    - "## Tool Results"
  outcomes:
    - type: task_completed
