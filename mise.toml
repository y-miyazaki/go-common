# mise - Dev Tools, Env Vars, Task Runner
# https://mise.jdx.dev/

[settings]
activate_aggressive = true # Aggressively activate tools in the current config for all shells and commands; may cause unexpected tool activations but closest to former auto_activate.
auto_install = true # Auto-install tools when a mise-managed config is entered or evaluated; closest behavior to former lazy_install.
exec_auto_install = true # Auto-install tools when commands are run via `mise x` / `mise exec`.
github_attestations = true # Verify GitHub release attestations when a backend supports them.
lockfile = true # Generate and maintain mise.lock with resolved URLs and checksums.
locked = true # Require lockfile entries during installs to reduce unexpected upstream changes.
minimum_release_age = "7d" # Avoid very recent releases to reduce supply-chain risk from rushed or bad publishes.
not_found_auto_install = true # Try installing missing tools when a command is looked up from the current config.
provenance_api_failures_fatal = true # Fail installs if provenance verification APIs are unavailable or verification fails.
slsa = true # Require SLSA provenance checks when a backend supports them.
trusted_config_paths = [
  "/workspace/",          # for workspace containers which mount repos to /workspace
  "/tmp/renovate/repos/", # for Renovate bot which clones repos to /tmp/renovate/repos/
] # Paths to automatically trust mise.toml files in without prompting; use with caution.

[settings.aqua]
cosign = true   # Verify cosign signatures for aqua-backed packages when available.
minisign = true # Verify minisign signatures for aqua-backed packages when available.
slsa = true     # Require SLSA provenance for aqua-backed packages when available.

[settings.github]
slsa = true # Require SLSA provenance for GitHub-hosted packages when available.

[settings.npm]
package_manager = "pnpm" # Package manager to use for npm-based tools; set to null to disable npm tool support.

[settings.pipx]
uvx = true # Install uv/uvx via pipx for better isolation and performance.

[tools]
# A Runtime tools
aqua = "v2.60.1"
node = "24.16.0"
pnpm = { version = "11.7.0", depends = ["node"] }
python = "3.14.6"

# AI agent tools
"github:microsoft/apm" = "v0.20.0"               # agent package manager
"npm:@anthropic-ai/claude-code" = { version = "2.1.185", depends = [
  "node",
], install_env = { NPM_CONFIG_IGNORE_SCRIPTS = "false" }, postinstall = "node $(find $MISE_TOOL_INSTALL_PATH -name 'install.cjs' -path '*/@anthropic-ai/claude-code/*' | head -1)" } # Claude Code CLI
"github:DeusData/codebase-memory-mcp" = "v0.7.0" # codebase memory MCP server
"aqua:github/copilot-cli" = "1.0.63"             # GitHub Copilot CLI
"pipx:headroom-ai" = { version = "0.26.0", extras = "proxy,mcp,bedrock", depends = ["python"] }
"github:yvgude/lean-ctx" = "v3.7.5"              # context optimizer
"github:microsoft/waza" = "0.33.0"               # agent skill evaluator

# AWS related tools
"aqua:aws/aws-cli" = "2.35.6"      # AWS CLI
"aqua:aws/aws-sam-cli" = "1.162.1"  # SAM CLI tool
"npm:awsp" = { version = "0.2.0", depends = [
  "node",
], install_env = { NPM_CONFIG_IGNORE_SCRIPTS = "true" } } # AWS profile switcher
"aqua:kayac/ecspresso" = "2.8.4"    # ECS deployment tool
"aqua:Songmu/ecschedule" = "0.19.0" # ECS scheduled tasks deployment tool
"pipx:aws-mfa" = { version = "0.0.12", depends = ["python"] } # AWS MFA helper

# GitHub related tools
"aqua:rhysd/actionlint" = "1.7.12"                                    # GitHub Actions linter
"aqua:suzuki-shunsuke/disable-checkout-persist-credentials" = "1.0.0" # disable persist-credentials in checkout action
"aqua:cli/cli" = "2.94.0"                                             # GitHub CLI (gh)
"aqua:suzuki-shunsuke/ghalint" = "1.5.6"                              # GitHub Actions linter
"aqua:suzuki-shunsuke/ghatm" = "1.0.0"                                # auto-set timeout-minutes for GitHub Actions jobs
"aqua:suzuki-shunsuke/pinact" = "4.1.0"                               # GitHub Actions pinning tool
"aqua:zizmorcore/zizmor" = "1.25.2"                                   # GitHub Actions security auditor

# Go related tools
"aqua:air-verse/air" = "1.65.3"                                           # live reload
"aqua:bufbuild/buf" = "1.71.0"                                            # protobuf linter and formatter
"aqua:go-delve/delve" = "1.26.3"                                          # debugger
"aqua:mvdan/gofumpt" = "0.10.0"                                           # code formatter
"aqua:golangci/golangci-lint" = "2.12.2"                                  # linter
"aqua:goreleaser/goreleaser" = "2.16.0"                                   # release automation
"go:golang.org/x/tools/gopls" = "v0.22.0"                                 # Go language server
"go:golang.org/x/vuln/cmd/govulncheck" = "1.3.0"                          # vulnerability scanner
"aqua:ko-build/ko" = "0.18.1"                                             # container builder
"aqua:vektra/mockery" = "3.7.1"                                           # mock code generator for interfaces
"go:github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen" = "v2.7.1"  # OpenAPI code generator
"aqua:protocolbuffers/protobuf/protoc" = "35.0"                            # protobuf compiler
"aqua:protocolbuffers/protobuf-go/protoc-gen-go" = "1.36.11"              # protobuf code generator
"aqua:grpc/grpc-go/protoc-gen-go-grpc" = "1.6.1"                          # gRPC code generator
"aqua:swaggo/swag" = "1.16.6"                                             # API documentation generator
"aqua:go-swagger/go-swagger" = "0.34.1"                                   # API documentation generator (swagger)

# Lint / Formatter tools
"npm:cspell" = { version = "10.0.1", depends = [
  "node",
], install_env = { NPM_CONFIG_IGNORE_SCRIPTS = "true" } } # spell checker
"npm:markdown-link-check" = { version = "3.14.2", depends = [
  "node",
], install_env = { NPM_CONFIG_IGNORE_SCRIPTS = "true" } } # Markdown link checker
"npm:markdownlint-cli2" = { version = "0.22.1", depends = [
  "node",
], install_env = { NPM_CONFIG_IGNORE_SCRIPTS = "true" } } # Markdown linter

# Security related tools
"aqua:gitleaks/gitleaks" = "8.30.1"  # secret scanner
"pipx:pre-commit" = { version = "4.6.0", depends = [
  "python",
] } # pre-commit framework
"aqua:aquasecurity/trivy" = "0.71.1" # vulnerability scanner

# Terraform related tools
"aqua:getsops/sops" = "3.13.1"                  # encryption tool
"aqua:hashicorp/terraform" = "1.15.6"           # infrastructure as code
"aqua:terraform-docs/terraform-docs" = "0.24.0" # documentation generator
"aqua:terraform-linters/tflint" = "0.63.1"      # linter

# Utility tools
"aqua:google/go-jsonnet" = "0.22.0"  # Jsonnet command-line tool
"aqua:BurntSushi/ripgrep" = "15.1.0" # grep alternative (rg)
"aqua:tamasfe/taplo" = "0.10.0"      # TOML formatter / LSP
"aqua:jdx/usage" = "3.4.0"           # usage CLI tool for command help and completions
"aqua:astral-sh/uv" = "0.11.21"      # uv/uvx

[tasks.mise-install]
description = "Install tools defined in mise.toml"
alias = ["mi"]
depends = ["mise-install-core"]
run = "NPM_CONFIG_IGNORE_SCRIPTS=true mise install --yes"

[tasks.mise-install-core]
description = "Install core runtimes first"
alias = ["mic"]
run = "NPM_CONFIG_IGNORE_SCRIPTS=true mise install --yes python node pnpm aqua"

[tasks.mise-lock]
description = "Regenerate mise.lock (required after changing tools/settings)"
alias = ["ml"]
run = "sh -c 'MISE_LOCKED=0 mise lock'"

[tasks.mise-trust]
description = "Trust project mise.toml non-interactively"
alias = ["mt"]
run = "mise trust --yes /workspace/mise.toml"

[tasks.mise-doctor]
description = "Run mise doctor checks"
alias = ["md"]
run = "mise doctor"
