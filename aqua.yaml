---
# aqua - Declarative CLI Version Manager
# https://aquaproj.github.io/
checksum:
  enabled: true
  require_checksum: true
  supported_envs:
    - all
registries:
  - type: standard
    ref: v4.501.0 # renovate: depName=aquaproj/aqua-registry datasource=github-tags
packages:
  # Utility tools
  - name: BurntSushi/ripgrep@15.1.0 # grep alternative
  - name: google/go-jsonnet@v0.22.0 # Jsonnet command-line tool
  # Security related tools
  - name: pre-commit/pre-commit@v4.6.0 # pre-commit framework
  - name: gitleaks/gitleaks@v8.30.1 # secret scanner
  - name: aquasecurity/trivy@v0.70.0 # vulnerability scanner
  # AWS related tools
  - name: aws/aws-cli@2.34.43 # AWS CLI
  - name: kayac/ecspresso@v2.8.3 # ECS deployment tool
  - name: Songmu/ecschedule@v0.17.2 # ECS scheduled tasks deployment tool
  - name: aws/aws-sam-cli@v1.159.1 # SAM CLI tool
  # GitHub related tools
  - name: cli/cli@v2.92.0 # GitHub CLI
  - name: github/copilot-cli@v1.0.41 # GitHub Copilot CLI
  - name: rhysd/actionlint@v1.7.12 # GitHub Actions linter
  - name: suzuki-shunsuke/disable-checkout-persist-credentials@v1.0.0 # GitHub Actions settings persist-credentials
  - name: suzuki-shunsuke/ghalint@v1.5.6 # GitHub Actions linter
  - name: suzuki-shunsuke/ghatm@v1.0.0 # GitHub Actions settings timeout-minutes
  - name: suzuki-shunsuke/pinact@v3.9.2 # GitHub Actions pinning tool
  - name: zizmorcore/zizmor@v1.24.1 # GitHub Actions settings concurrency
  # Go related tools
  - name: protocolbuffers/protobuf-go/protoc-gen-go@v1.36.11 # protobuf code generator
  - name: grpc/grpc-go/protoc-gen-go-grpc@cmd/protoc-gen-go-grpc/v1.6.1 # gRPC code generator
  - name: bufbuild/buf@v1.68.4 # protobuf linter and formatter
  - name: protocolbuffers/protobuf/protoc@v34.1 # protobuf compiler
  - name: oapi-codegen/oapi-codegen@v2.6.0 # OpenAPI code generator
  - name: go-delve/delve@v1.26.3 # debugger
  - name: golangci/golangci-lint@v2.11.4 # linter
  - name: mvdan/gofumpt@v0.9.2 # code formatter(vs gofmt)
  - name: air-verse/air@v1.65.1 # live reload
  - name: golang/vuln/govulncheck@v1.3.0 # vulnerability scanner
  - name: swaggo/swag@v1.16.6 # API documentation generator
  - name: go-swagger/go-swagger@v0.33.2 # API documentation generator
  - name: ko-build/ko@v0.18.1 # container builder
  - name: goreleaser/goreleaser@v2.15.4 # release automation
  - name: golang.org/x/tools/gopls@v0.21.1 # Go language server
  # Terraform related tools
  - name: hashicorp/terraform@v1.15.0 # terraform
  - name: terraform-linters/tflint@v0.62.0 # linter
  - name: terraform-docs/terraform-docs@v0.22.0 # documentation generator
  - name: getsops/sops@v3.12.2 # encryption tool
  - name: jamesWoolfenden/pike@v0.4.1
