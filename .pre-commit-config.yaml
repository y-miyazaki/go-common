# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-case-conflict
      - id: check-json
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json)$)'
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        exclude: '^(lambda/template\.yaml|mkdocs\.yml)$'
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
        exclude: '(?:^|/)(?:.*/)?terraform\.(?!example\.)[^.]+\.tfvars$'
      - id: end-of-file-fixer
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json|.*\.md)$)'
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # args: ['--baseline', '.secrets.baseline']
        # Exclude go tests, gitleaks config, lock/checksums, .loop/ state, terraform.*.tfvars
        exclude: '(.*_test.go|.gitleaks.toml|apm.lock.yaml|aqua-checksums.json|(?:^|/)\.loop/|(?:^|/)(?:.*/)?terraform\.(?!example\.)[^.]+\.tfvars$)'
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: ["--config=.gitleaks.toml"]
  # --------------------------------------------------------------
  # For Shell Script
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Shell script static analysis tool.
        language: system
        entry: shellcheck
        files: \.(sh|bats)$
      - id: shfmt
        name: shfmt
        description: Shell script formatter.
        language: system
        entry: shfmt -w -s -i 4 -ci -bn -sr
        files: \.(sh|bats)$
  # --------------------------------------------------------------
  # For Commit Message
  # --------------------------------------------------------------
  # - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
  #   rev: v9.25.0
  #   hooks:
  #     - id: commitlint
  #       stages: [commit-msg]
  #       additional_dependencies: ["@commitlint/config-conventional"]
  # --------------------------------------------------------------
  # For GitHub Actions
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        description: GitHub Actions workflow linter.
        language: system
        entry: actionlint -color=false
        types: [yaml]
        files: ^\.github/workflows/.*\.(ya?ml)$
  - repo: local
    hooks:
      - id: ghalint
        name: ghalint
        description: GitHub Actions workflow linter.
        language: system
        entry: ghalint run --log-color never
        types: [yaml]
        files: ^\.github/workflows/.*\.(ya?ml)$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      # Run the linter.
      - id: zizmor
  # --------------------------------------------------------------
  # For Go
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        description: Fast linters runner for Go.
        entry: golangci-lint run --max-same-issues=0 --max-issues-per-linter=0 --fix
        exclude: ^(.*_test.go|tmp/.*\.go)$
        language: system
        pass_filenames: false
        types: [go]
  # --------------------------------------------------------------
  # For Jsonnet
  # --------------------------------------------------------------
  # - repo: https://github.com/google/go-jsonnet
  #   rev: v0.22.0
  #   hooks:
  #     - id: jsonnet-format
  #     - id: jsonnet-lint
  # --------------------------------------------------------------
  # For Markdown
  # --------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]
        files: \.md$
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--quiet]
  # --------------------------------------------------------------
  # For Prettier
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        description: Code formatter (respects .editorconfig).
        entry: prettier --write --ignore-unknown
        exclude: '(^.*(\.devcontainer/devcontainer(-lock)?\.json|settings\.json|settings-example\.json|apm\.lock\.yaml|mise\.lock)$)'
        files: \.(cjs|css|html|js|json|jsonc|jsx|md|mjs|tsx?|ya?ml)$
        language: system
