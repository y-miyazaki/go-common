# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
        exclude: '^lambda/template\.yaml$'
      - id: destroyed-symlinks
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: '(^\.devcontainer/devcontainer-lock\.json$)'
      - id: pretty-format-json
        args: [--autofix, --no-sort-keys]
      - id: requirements-txt-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # args: ['--baseline', '.secrets.baseline']
        # Exclude go test file and gitleaks config and any terraform.*.tfvars files in any directory
        exclude: '(.*_test.go|.gitleaks.toml|apm.lock.yaml|aqua-checksums.json|(?:^|/)(?:.*/)?terraform\.[^.]+\.tfvars$)'
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  # --------------------------------------------------------------
  # For Shell Script
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        description: Shell script static analysis tool.
        language: system
        entry: shellcheck
        types: [shell]
      - id: shfmt
        name: shfmt
        description: Shell script formatter.
        language: system
        entry: shfmt -w -i 4 -ci -bn -sr
        types: [shell]
  # --------------------------------------------------------------
  # For GitHub Actions
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint
        description: GitHub Actions workflow linter.
        language: system
        entry: actionlint -color=false
        types: [yaml]
        files: ^\.github/workflows/.*\.(ya?ml)$
  # - repo: local
  #   hooks:
  #     - id: ghalint
  #       name: ghalint
  #       description: GitHub Actions workflow linter.
  #       language: system
  #       entry: ghalint run --log-color never
  #       types: [yaml]
  #       files: ^\.github/workflows/.*\.(ya?ml)$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2 # https://github.com/zizmorcore/zizmor-pre-commit/releases
    hooks:
      # Run the linter.
      - id: zizmor
  # --------------------------------------------------------------
  # For Markdown
  # --------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1 # https://github.com/DavidAnson/markdownlint-cli2/releases
    hooks:
      - id: markdownlint-cli2
        args: ["--fix"]
        files: \.md$
  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.14.2
    hooks:
      - id: markdown-link-check
        args: [--quiet]
  # --------------------------------------------------------------
  # For Jsonnet
  # --------------------------------------------------------------
  # - repo: https://github.com/google/go-jsonnet
  #   rev: v0.22.0 # https://github.com/google/go-jsonnet/releases
  #   hooks:
  #     - id: jsonnet-format
  #     - id: jsonnet-lint
  # --------------------------------------------------------------
  # For Go
  # --------------------------------------------------------------
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        description: Fast linters runner for Go.
        entry: golangci-lint run --max-same-issues=0 --max-issues-per-linter=0 --config=.golangci.yaml --fix
        exclude: ^(.*_test.go|tmp/.*\.go)$
        language: system
        pass_filenames: false
        types: [go]
