id: go-validation-trigger-negative-001
name: go-validation rejects non-validation request
description: 'Validate that go-validation does not attempt to perform code review
  or feature implementation.

  '
tags:
- quality
- trigger-negative
- boundary-guardrail
inputs:
  prompt: 'Use go-validation. The user asks for a code review with design suggestions.
    The skill should recognize this is out of scope (validation only, not review).
    If out of scope, return ## Summary with explanation. Include ## Tool Results.'
  context:
    target: SKILL.md
expected:
  output_contains:
  - out of scope
  - '## Summary'
  outcomes:
  - type: task_completed
