id: changelog-trigger-negative-001
name: changelog rejects manual release tagging
description: Validate manual git tag or release cut requests are out of scope.
tags:
  - quality
  - trigger-negative
inputs:
  prompt: >-
    Use changelog. The user asks to create git tag v2.0.0 and publish a GitHub release now.
    This skill must not create tags or cut releases. Note the request as out of scope in ##
    Overview. Survey only — list the injected chore commit under ### Candidates. Do not edit
    CHANGELOG.md. Do not emit ### Changes or ## Verification. Include ## Summary per
    common-output-format.md. State no edits applied in Overview.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: true
    commit_range: eval0001..eval0002
    skip: false
    commits:
      - sha: eval0002
        type: chore
        scope: release
        breaking: false
        subject: prepare release notes
    releases: []
expected:
  output_contains:
    - out of scope
    - Overview
    - Candidates
  outcomes:
    - type: task_completed
