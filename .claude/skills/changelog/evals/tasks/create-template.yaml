id: changelog-create-001
name: changelog creates template when changelog missing
description: Validate changelog_exists false triggers Keep a Changelog template creation.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use changelog at L2. changelog_exists is false. Create the Keep a
    Changelog template at changelog_file, then add the injected fix commit under
    ## [Unreleased]. Report in Summary that the file was created. Emit PR ## Overview and ## Summary plus Session Metrics table with Commits Processed and Skipped Commits sections.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: false
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    commits:
      - sha: eval0002
        type: fix
        scope: ""
        breaking: false
        subject: correct changelog scope formatting
    releases: []
expected:
  output_contains:
    - created
    - Summary
    - Commits Processed
  outcomes:
    - type: task_completed
