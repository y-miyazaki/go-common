id: changelog-basic-001
name: changelog-basic
description: >-
  Process conventional commits and report changelog updates with Commits
  Processed and Summary sections.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use changelog at L2. Process the injected conventional commits and emit
    the full changelog report with sections Commits Processed, Skipped Commits,
    and Summary. Include Commits Processed and Summary wording in the report. Emit PR ## Overview and ## Summary plus Session Metrics table with Commits Processed and Skipped Commits sections.
  context:
    changelog_file: CHANGELOG.md
    commit_range: eval0001..eval0002
    level: L2
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add changelog workflow
expected:
  output_contains:
    - Commits Processed
    - Summary
  outcomes:
    - type: task_completed
