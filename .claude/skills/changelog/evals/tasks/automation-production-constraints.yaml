id: changelog-automation-constraints-001
name: changelog automation production constraints
description: Validate LE workflow Constraints with may_edit from loop-prompt-generate shape.
tags:
  - quality
  - automation
inputs:
  prompt: >-
    Use changelog. ## Constraints may_edit: true write_target: fix You MUST persist edits to disk in the
    worktree; a report alone is not sufficient when may_edit is true. Allowed paths:
    CHANGELOG.md. Process injected commits; emit apply shape with ### Changes and ##
    Verification plus ## Session Metrics. Do not emit ### Candidates. Emit ## Overview and
    ## Summary per common-output-format.md.
  context:
    changelog_file: CHANGELOG.md
    changelog_exists: true
    commit_range: eval0001..eval0002
    skip: false
    commits:
      - sha: eval0002
        type: feat
        scope: changelog
        breaking: false
        subject: add changelog workflow
expected:
  output_contains:
    - Changes
    - Overview
    - Verification
    - Session Metrics
  outcomes:
    - type: task_completed
