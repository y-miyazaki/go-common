name: refactor-eval
description: >-
  Evaluation suite for refactor.
  Verifies Refactor Result / Session Report sections, O1/O2 scope language, and no-op exits.
skill: refactor
version: "1.2"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'## Overview' in output"
        - "'## Summary' in output"
        - "'Refactor Result' in output or 'Refactor Session Report' in output"
        - >-
          '## Verification' in output or '### Candidates' in output
          or 'no-op' in output.lower() or 'proposal' in output.lower()
        - >-
          '### Changes' in output or '### Candidates' in output
          or 'no-op' in output.lower() or 'Session Metrics' in output
          or 'proposal' in output.lower()
  - type: text
    name: report_sections
    weight: 0.5
    config:
      regex_match:
        - (## Overview|## Summary|Refactor Result|Refactor Session Report)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml
