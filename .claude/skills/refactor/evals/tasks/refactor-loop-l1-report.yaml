id: refactor-loop-l1-001
name: refactor loop path L1 survey only
description: Validate loop path surveys all hints without edits at L1 using survey template shape.
tags:
  - quality
  - loop-path
  - output-contract
inputs:
  prompt: >-
    Use refactor (loop path) at L1. Survey every hint in context. Do not edit files.
    Emit Refactor Session Report per common-output-format-loop.md with Session Metrics,
    plus PR sections from pr-body-template-survey.md: ## Overview, ## Summary with
    ### Candidates for every hint. Do NOT emit ### Changes, ### Deferred, or
    ## Verification.
  context:
    commit_range: eval0001..eval0002
    level: L1
    skip: false
    hints:
      - kind: duplication_block
        path: scripts/example.sh
        detail: lines 10-17 duplicate scripts/other.sh:40-47
        lines: 8
      - kind: oversized_unit
        path: scripts/big.sh
        detail: file exceeds line threshold
        lines: 450
expected:
  output_contains:
    - Refactor Session Report
    - "### Candidates"
    - Session Metrics
    - "## Overview"
    - "## Summary"
  output_not_contains:
    - "### Changes"
    - "## Verification"
  outcomes:
    - type: task_completed
