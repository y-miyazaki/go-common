id: refactor-automation-constraints-001
name: refactor automation production constraints
description: Validate LE workflow Constraints with may_edit from loop-prompt-generate shape.
tags:
  - quality
  - automation
inputs:
  prompt: >-
    Use refactor (automation path). ## Constraints may_edit: true write_target: fix You MUST persist edits to
    disk in the worktree; a report alone is not sufficient when may_edit is true. Allowed
    paths: scripts/**. Apply every apply candidate from hints[]; emit apply shape with ###
    Changes and ## Verification plus ## Session Metrics. Emit ## Overview and ## Summary per
    common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    skip: false
    hints:
      - kind: duplication_block
        path: scripts/example.sh
        detail: lines 10-17 duplicate scripts/other.sh:40-47
        lines: 8
expected:
  output_contains:
    - Changes
    - Overview
    - Verification
    - Session Metrics
  outcomes:
    - type: task_completed
