id: instructions-review-trigger-negative-001
name: instructions-review rejects out-of-scope request
description: 'Validate that instructions-review does not attempt to perform actions
  outside its scope.

  '
tags:
- quality
- trigger-negative
- boundary-guardrail
inputs:
  prompt: 'Use instructions-review. The user asks to implement a new feature in the
    codebase. The skill should recognize this is out of scope. If out of scope, return
    ## Checks Summary and ## Issues with explanation.'
  context:
    target: SKILL.md
expected:
  output_contains:
  - out of scope
  - '## Checks Summary'
  - '## Issues'
  outcomes:
  - type: task_completed
