id: report-tech-debt-truncation-001
name: report-tech-debt caps Critical and High-Priority at 25
description: Validate overflow moves to Watch with truncation note when over cap.
tags:
  - quality
  - edge-case
inputs:
  prompt: >-
    Use report-tech-debt at L2. Assume classification yields 20 High-Priority marker
    findings plus 6 Critical security findings (26 total above cap). Retain all
    Critical first, then High-Priority until 25 combined; move overflow to Watch.
    Set Truncated to yes in Summary. Emit PR ## Overview and ## Summary plus Session Metrics table with Critical, High-Priority, Watch, and Noise / Ignore sections including Category fields.
  context:
    level: L2
    report_file: docs/report/report-tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: hack
        path: evals/files/sample_service.go.txt
        line: 10
        snippet: "HACK: duplicated across services"
        hint: code_quality
    hotspots: []
expected:
  output_contains:
    - Truncated
    - Critical
    - Watch
    - Summary
  outcomes:
    - type: task_completed
