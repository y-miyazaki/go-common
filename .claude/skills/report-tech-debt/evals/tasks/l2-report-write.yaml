id: report-tech-debt-l2-write-001
name: report-tech-debt L2 writes persisted report file
description: Validate L2 emits session summary and writes report_file path in Summary.
tags:
  - quality
  - level
inputs:
  prompt: >-
    Use report-tech-debt at L2. Classify the injected eol_hint as dependency_version
    under High-Priority. Emit full session summary and write report_file
    docs/report/report-tech-debt/2026-07-19.md per allowlist. State report_file path in
    Summary. Emit PR ## Overview and ## Summary plus Session Metrics table with Critical, High-Priority, Watch, and Noise / Ignore sections including Category fields.
  context:
    level: L2
    report_file: docs/report/report-tech-debt/2026-07-19.md
    skip: false
    signals:
      - kind: eol_hint
        path: evals/files/go.mod.txt
        line: 5
        snippet: "require github.com/old/lib v1.2.3"
        source: go_mod
        hint: dependency_version
    hotspots: []
expected:
  output_contains:
    - dependency_version
    - High-Priority
    - docs/report/report-tech-debt/2026-07-19.md
    - L2
    - Summary
  outcomes:
    - type: task_completed
