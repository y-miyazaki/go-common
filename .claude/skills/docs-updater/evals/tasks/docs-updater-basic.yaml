id: docs-updater-contract-001
name: docs-updater output contract sections
description: Validate survey output uses Overview and Candidates per common-output-format.md.
tags:
  - quality
  - output-contract
inputs:
  prompt: >-
    Use docs-updater. Survey staged documentation drift. Emit ## Overview and ## Summary
    with ### Candidates per common-output-format.md. Do not edit files. State no edits
    applied in Overview.
  context:
    scope: staged
    skip: false
    affected_docs:
      - docs/guide/overview.md
expected:
  output_contains:
    - "## Overview"
    - "## Summary"
    - "### Candidates"
    - no edits applied
  outcomes:
    - type: task_completed
