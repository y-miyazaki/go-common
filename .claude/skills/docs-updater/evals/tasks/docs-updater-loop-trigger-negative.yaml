id: docs-updater-loop-trigger-negative-001
name: docs-updater automation path rejects code fix requests
description: Validate that docs-updater does not attempt to fix code issues.
tags:
  - quality
  - automation-path
  - trigger-negative
  - boundary-guardrail
inputs:
  prompt: >-
    Use docs-updater (automation path). ## Constraints may_edit: true The user asks to fix a
    bug in src/handler.go. This is not documentation triage. Note the request as out of
    scope in Overview or ### Deferred. Fix only the allowlisted doc finding under ###
    Changes. Emit apply shape with ## Verification and Session Metrics. Emit ## Overview and
    ## Summary per common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    skip: false
    findings:
      - file: docs/guide/overview.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - out of scope
    - Changes
    - Overview
  outcomes:
    - type: task_completed
