id: docs-updater-loop-fixture-001
name: docs-updater automation path fixes stale workflow reference
description: Validate may_edit true apply shape fixes stale workflow path in fixture doc.
tags:
  - quality
  - automation-path
  - fixture
inputs:
  prompt: >-
    Use docs-updater (automation path). ## Constraints may_edit: true Allowed paths:
    evals/files/README.stale.md Fix the stale workflow reference in
    evals/files/README.stale.md per injected finding. Emit apply shape with ### Changes
    listing the file, ## Overview naming the fix, and ## Verification. Include Session
    Metrics. Include ## Summary per common-output-format.md.
  context:
    commit_range: eval0001..eval0002
    skip: false
    findings:
      - file: evals/files/README.stale.md
        reason: references deleted workflow ci-build.yaml
        source_commit: eval0002
expected:
  output_contains:
    - Changes
    - README.stale.md
    - ci-build.yaml
    - Overview
    - Verification
  outcomes:
    - type: task_completed
