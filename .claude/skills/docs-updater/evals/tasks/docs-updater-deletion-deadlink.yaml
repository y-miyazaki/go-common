id: docs-updater-deletion-001
name: docs-updater deletion dead-link removal
description: |
  Validate that deleted files trigger dead reference removal from documentation.

tags:
  - quality
  - deletion-path
  - edge-case

inputs:
  prompt: "Use docs-updater. Assume '.github/workflows/on-release.yaml' was deleted and docs/reference/specification.md references it. Return ## Summary with 'Status: updated', ## Changes showing dead link removal, and ## Skipped Items."
  context:
    scope: staged

expected:
  output_contains:
    - "## Summary"
    - "Status: updated"
    - "## Changes"
    - "on-release"
    - "## Skipped Items"
  outcomes:
    - type: task_completed
