name: docs-updater-eval
description: >-
  Evaluation suite for docs-updater.
  Verifies interactive/hook path (detect_changes.sh) and loop path (findings JSON),
  skip conditions, and structured report output.
skill: docs-updater
version: "1.2"
config:
  trials_per_task: 5
  timeout_seconds: 180
  parallel: false
  executor: mock
  model: claude-sonnet-4-20250514
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: Verify evaluation task completes successfully.
graders:
  - type: code
    name: has_structured_output
    weight: 1.0
    config:
      assertions:
        - "'Documentation Triage Report' in output or '## Summary' in output"
        - "'Session Metrics' in output or 'Outcome' in output or 'Status:' in output"
        - >-
          'High-Priority Items' in output or 'No documentation impact detected' in output
          or 'No documentation update required' in output or 'exceeded-scope' in output
          or '## Changes' in output or '## Skipped Items' in output
  - type: text
    name: report_sections
    weight: 0.5
    config:
      regex_match:
        - (Documentation Triage Report|High-Priority Items|Session Metrics|## Summary|## Changes|## Skipped Items)
  - type: behavior
    name: bounded_runtime
    weight: 0.5
    config:
      max_tool_calls: 30
      max_tokens: 120000
      max_duration_ms: 180000
tasks:
  - evals/tasks/*.yaml

